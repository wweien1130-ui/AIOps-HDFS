# ============================================
# LLM模型配置
# ============================================

# 默认LLM提供商
default_provider: "ollama"

# Ollama配置
ollama:
  # 基础URL
  base_url: "http://localhost:11434"

  # 可用模型列表
  models:
    default: "llama3"
    options:
      - "llama3"
      - "mistral"
      - "qwen"
      - "codellama"

  # 生成参数
  generation:
    temperature: 0.7
    max_tokens: 1000
    top_p: 0.9
    top_k: 40

  # 超时设置
  timeout: 30

# DeepSeek API配置
deepseek:
  # API端点
  base_url: "https://api.deepseek.com/v1"

  # 模型选项
  models:
    default: "deepseek-chat"
    options:
      - "deepseek-chat"
      - "deepseek-coder"

  # 生成参数
  generation:
    temperature: 0.7
    max_tokens: 2000
    top_p: 0.9

  # 认证（从环境变量读取）
  auth:
    api_key: "${DEEPSEEK_API_KEY}"

  # 请求配置
  request:
    timeout: 60
    max_retries: 3


qwen:
  # API端点
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"


# 本地模型配置（可选）
local:
  model_path: ""
  device: "auto"
  load_in_8bit: false